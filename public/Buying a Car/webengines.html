<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebEngines</title>

    <style>
        body {
            background-color: lightcoral;
            margin: 0;
            font-family: sans-serif;
        }

        header {
            background-color: brown;
            width: 100%;
            height: 100px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        footer {
            background-color: brown;
            width: 100%;
            height: 100px;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        section {
            margin-top: 50px;
            margin-right: 100px;
            margin-left: 100px;
        }

        .row {
            display: flex;
            justify-content: center;
            gap: 300px;
            margin-bottom: 200px;
        }

        .box {
            width: 400px;
            height: 300px;
        }

        .box img {
            display: block;
            width: 400px;
            height: 300px;
        }

        button {
            width: 100%;
            height: 40px;
            background-color: lightgreen;
            font-size: 20px;
            cursor: pointer;
            border: none;
        }
        button:hover {
            background-color: #90ee90;
        }

        .subtitle {
            width: 100%;
            height: 40px;
            background-color: lightyellow;
            color: black;
            align-content: center;
            text-align: center;
        }

        .subtitle h2{ margin: 0; }

        .sold-out {
            background-color: red;
            color: white;
            height: 40px;
            align-content: center;
            text-align: center;
        }

        .sold-out h2 { margin: 0; }

    </style>
</head>
<body>
    
    <header>
        <h1>WebEngines</h1>
    </header>

    <section>

        <div class="row">
            
            <div class="box" data-car="twingo">
                <img src="images/twingo.jpg">
                <div class="subtitle" style="display: none;"><h2>R$ -</h2></div>
                
                <div class="sold-out" style="display: block;">
                    <h2>SOLD OUT</h2>
                </div>
            </div>

            <div class="box" data-car="alpine">
                <img src="images/alpine.jpg" class="car-img"> 
                <div class="subtitle"><h2>R$10.000</h2></div>
                
                <button onclick="comprar_carro(this)">COMPRAR</button> 
            </div>

        </div>

        <div class="row">
            <div class="box" data-car="kwid">
                <img src="images/kwid.jpeg" class="car-img">
                <div class="subtitle"><h2>R$150.000</h2></div>
                
                <button onclick="comprar_carro(this)">COMPRAR</button>
            </div>
        
            <div class="box" data-car="ae86">
                <img src="images/ae86.jpg">
                <div class="sold-out" style="display: block;"><h2>SOLD OUT</h2></div>
            </div>

        </div>

        <div class="row">
            <div class="box" data-car="onix">
                <img src="images/onix.jpg">
                <div class="subtitle"><h2>WE ARE FIXING IT</h2></div>
                </div>

            <div class="box" data-car="byd">
                <img src="images/byd.jpg" class="car-img">
                <div class="subtitle"><h2>R$100.000</h2></div>
                
                <button onclick="comprar_carro(this)">COMPRAR</button>
            </div>
        </div>

    </section>

    <footer></footer>

    <script>
    function comprar_carro(btn) {
        // Pega o elemento pai (box) para saber qual carro é
        const box = btn.closest(".box");
        const nome_carro = box.dataset.car;

        if(!confirm(`Deseja comprar o ${nome_carro}?`)) return;

        console.log("Enviando pedido de compra:", nome_carro);

        fetch("/webengines", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ 
                carro: nome_carro
            })
        })
        .then(res => {
            if (res.ok) {
                alert("Compra realizada com sucesso!");
                // Como é HTML estático, não atualizamos visualmente
            } else {
                alert("Erro: Produto esgotado ou erro no servidor.");
            }
        })
        .catch(err => console.error("ERRO:", err));
    }
    </script>

</body>
</html>
