<body>

  <h1>Área de Cadastro</h1>

    <form method="get" action="/cadastra">
      <p class="box">Usuário: <input type="text" name="usuario"></p>
      <p>Senha: <input type="password" name="senha"></p>
      <p>Nome: <input type="text" name="nome"></p>
      <p>Sobrenome: <input type="text" name="sobrenome"></p>
      <p>Nascimento: <input type="date" name="nascimento"></p>
      <p>CPF: <input type="number" name="cpf"></p>
      <p>CEP: <input type="number" name="cep"></p>
      <input type="submit" value="Enviar">
    </form>
  </div>
